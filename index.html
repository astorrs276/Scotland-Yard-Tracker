<!DOCTYPE html>
<html>
<head>
    <title>Scotland Yard Tracker</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<script src="scripts/move_lists.js"></script>
<script src="scripts/main.js" defer></script>

<body>
    <h1>Scotland Yard Move Tracker</h1>

    <h3 id="previous-header">Previous: <span class="wrapped-text"></span></h3>
    <h3 id="current-header">Current: <span class="wrapped-text"></span></h3>

    <div class="input-row">
        <textarea rows="4"></textarea>
        <button value="Rewind">Rewind</button>
    </div>

    <div class="button-row">
        <button value="Taxi">Taxi</button>
        <button value="Bus">Bus</button>
        <button value="Metro">Metro</button>
        <button value="Mystery">Mystery</button>
        <button value="Revealed">Revealed</button>
    </div>
</body>
</html>
